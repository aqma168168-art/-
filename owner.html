<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>老闆管理後台 — 中央廚房</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Noto+Sans+TC:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.10.0/dist/tabler-icons.min.css">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- ── PIN 驗證遮罩 ───────────────────────────────────────── -->
<div id="pin-gate" class="pin-page">
  <div class="pin-card">
    <div class="pin-card__logo">中央廚房管理系統</div>
    <p class="pin-card__sub">老闆管理後台 — 請輸入 PIN</p>
    <input type="password" class="pin-input" id="pin-input"
           inputmode="numeric" maxlength="6" placeholder="● ● ● ● ● ●"
           autocomplete="off">
    <p class="pin-error" id="pin-error">PIN 錯誤，請重新輸入</p>
    <button class="btn btn--primary btn--full btn--lg" id="btn-pin-submit">
      <i class="ti ti-lock-open"></i> 驗證並進入
    </button>
    <p style="font-size:11px;color:var(--ink-400);text-align:center;margin-top:14px">
      <span class="conn-dot conn-dot--loading" id="conn-dot">⬤</span>
      <span id="conn-msg"> 連線中…</span>
    </p>
  </div>
</div>

<!-- ── 主應用（驗證通過後顯示）──────────────────────────── -->
<div id="app" class="app" style="display:none">
  <nav class="sidebar">
    <div class="sidebar__brand">
      <div class="sidebar__brand-name">中央廚房系統</div>
      <div class="sidebar__brand-sub">老闆管理後台</div>
      <span class="sidebar__portal-tag sidebar__portal-tag--owner">
        <i class="ti ti-crown" style="font-size:10px"></i> 老闆
      </span>
    </div>
    <nav class="sidebar__nav">
      <div class="sidebar__section-label">今日總覽</div>
      <div class="nav-item active" data-page="dashboard"><i class="ti ti-layout-dashboard"></i><span>今日總覽</span></div>

      <div class="sidebar__section-label" style="margin-top:8px">損益分析</div>
      <div class="nav-item" data-page="kitchen-pl"><i class="ti ti-building-factory-2"></i><span>中央廚房損益</span></div>
      <div class="nav-item" data-page="stall-pl"><i class="ti ti-chart-bar"></i><span>各攤位損益</span></div>
      <div class="nav-item" data-page="monthly"><i class="ti ti-calendar-stats"></i><span>月報表</span></div>

      <div class="sidebar__section-label" style="margin-top:8px">庫存 &amp; 成本</div>
      <div class="nav-item" data-page="inventory"><i class="ti ti-package"></i><span>庫存總覽</span></div>
      <div class="nav-item" data-page="costs"><i class="ti ti-receipt"></i><span>成本管理</span></div>

      <div class="sidebar__section-label" style="margin-top:8px">設定</div>
      <div class="nav-item" data-page="settings"><i class="ti ti-settings"></i><span>設定中心</span></div>
    </nav>
    <div class="sidebar__footer">
      <p class="sidebar__ver">v2.0.0</p>
    </div>
  </nav>

  <div class="main">
    <header class="topbar">
      <h1 class="topbar__title" id="page-title">今日總覽</h1>
      <div class="topbar__right">
        <span class="topbar__date" id="topbar-date"></span>
        <button class="btn btn--sm btn--danger" onclick="AUTH.logoutOwner()">
          <i class="ti ti-logout"></i> 登出
        </button>
      </div>
    </header>
    <div class="page-body" id="page-body"></div>
  </div>
</div>

<div class="loading-overlay" id="ck-loading"><div class="loading-box"><div class="loading-spinner"></div><p class="loading-msg">載入中…</p></div></div>
<div class="toast" id="ck-toast"></div>

<script src="js/config.js"></script>
<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script src="js/ui.js"></script>
<script src="js/owner.js"></script>
</body>
</html>
