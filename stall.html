<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>攤位回報 — 中央廚房</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600;700&family=Noto+Sans+TC:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.10.0/dist/tabler-icons.min.css">
<link rel="stylesheet" href="css/style.css">
</head>
<body style="background:var(--stall-bg)">

<div class="stall-page" id="stall-page">

  <!-- 天藍頂列 -->
  <header class="stall-topbar">
    <div>
      <div class="stall-topbar__title">📋 攤位回報</div>
      <div class="stall-topbar__date" id="stall-date-display"></div>
    </div>
    <span class="conn-badge--stall" id="stall-conn-badge">連線中</span>
  </header>

  <form id="stall-form" novalidate>

    <!-- 基本資料 -->
    <div class="stall-section">
      <div class="stall-section__head"><i class="ti ti-id-badge-2"></i>基本資料</div>
      <div class="stall-section__body">
        <div class="fg fg2" style="gap:12px">
          <div class="field field--stall">
            <label>日期</label>
            <input type="date" name="date" id="s-date" required>
          </div>
          <div class="field field--stall">
            <label>攤位 <span style="color:var(--red-500)">*</span></label>
            <select name="stall_id" id="s-stall" required>
              <option value="">請選擇…</option>
            </select>
          </div>
        </div>
        <div class="field field--stall" style="margin-top:12px">
          <label>回報人 <span style="color:var(--red-500)">*</span></label>
          <select name="reporter" id="s-reporter" required>
            <option value="">請選擇…</option>
          </select>
        </div>
      </div>
    </div>

    <!-- 今日銷售 -->
    <div class="stall-section">
      <div class="stall-section__head"><i class="ti ti-cash-register"></i>今日銷售</div>
      <div class="stall-section__body">
        <div class="fg fg2" style="gap:12px;margin-bottom:16px">
          <div class="field field--stall">
            <label>今日桶數 <span style="color:var(--red-500)">*</span></label>
            <select name="barrels" id="s-barrels" required>
              <option value="">選桶數…</option>
            </select>
          </div>
          <div class="field field--stall">
            <label>賣完時間 <span style="color:var(--red-500)">*</span></label>
            <div style="position:relative">
              <input type="text" name="sold_out_time" id="s-soldout"
                     placeholder="輸入時間，如 1430"
                     maxlength="5"
                     inputmode="numeric"
                     autocomplete="off"
                     required
                     style="padding:13px 14px;font-size:18px;font-weight:700;
                            border:2px solid var(--stall-card-border);
                            border-radius:var(--r-lg);width:100%;
                            letter-spacing:2px;font-family:var(--font-num);
                            color:var(--ink-950);outline:none;
                            -webkit-appearance:none;background:#FAFEFF">
              <span id="soldout-hint"
                    style="position:absolute;right:12px;top:50%;transform:translateY(-50%);
                           font-size:11px;color:var(--stall-accent-dark);
                           opacity:.6;pointer-events:none">
                例：1430
              </span>
            </div>
            <p style="font-size:11px;color:var(--stall-accent-dark);opacity:.7;margin-top:4px">
              輸入 4 位數字自動轉換，例如 1430 → 14:30
            </p>
          </div>
        </div>
        <!-- 大碗 / 小碗 -->
        <div class="big-num-row" style="overflow:hidden">
          <div class="big-num-field">
            <label>大碗數 <span style="color:var(--red-500)">*</span></label>
            <input type="number" name="big_bowls" id="s-big" min="0" value="0" inputmode="numeric">
          </div>
          <div class="big-num-field">
            <label>小碗數 <span style="color:var(--red-500)">*</span></label>
            <input type="number" name="small_bowls" id="s-small" min="0" value="0" inputmode="numeric">
          </div>
        </div>
      </div>
    </div>

    <!-- 收攤剩料 -->
    <div class="stall-section">
      <div class="stall-section__head"><i class="ti ti-archive"></i>收攤剩料</div>
      <div class="stall-section__body">
        <p style="font-size:12px;color:var(--stall-accent-dark);opacity:.7;margin-bottom:14px;font-weight:500">
          剩 0 請保持 0，收攤後立即填寫
        </p>

        <p style="font-size:11px;font-weight:700;color:var(--stall-accent-dark);margin-bottom:8px;letter-spacing:.5px;text-transform:uppercase">底料</p>
        <div class="rem-grid" style="margin-bottom:16px">
          <div class="rem-field"><label>大</label><select name="rem_base_L"></select></div>
          <div class="rem-field"><label>中</label><select name="rem_base_M"></select></div>
          <div class="rem-field"><label>小</label><select name="rem_base_S"></select></div>
        </div>

        <p style="font-size:11px;font-weight:700;color:var(--stall-accent-dark);margin-bottom:8px;letter-spacing:.5px;text-transform:uppercase">米</p>
        <div class="rem-grid" style="margin-bottom:16px">
          <div class="rem-field"><label>大</label><select name="rem_rice_L"></select></div>
          <div class="rem-field"><label>中</label><select name="rem_rice_M"></select></div>
          <div class="rem-field"><label>小</label><select name="rem_rice_S"></select></div>
        </div>

        <p style="font-size:11px;font-weight:700;color:var(--stall-accent-dark);margin-bottom:8px;letter-spacing:.5px;text-transform:uppercase">芋頭</p>
        <div class="rem-grid" style="margin-bottom:16px">
          <div class="rem-field"><label>大</label><select name="rem_taro_L"></select></div>
          <div class="rem-field"><label>中</label><select name="rem_taro_M"></select></div>
          <div class="rem-field"><label>小</label><select name="rem_taro_S"></select></div>
        </div>

        <p style="font-size:11px;font-weight:700;color:var(--stall-accent-dark);margin-bottom:8px;letter-spacing:.5px;text-transform:uppercase">其他</p>
        <div class="rem-grid">
          <div class="rem-field"><label>芋泥(包)</label><select name="rem_taro_paste"></select></div>
          <div class="rem-field"><label>碎皮蛋</label><select name="rem_broken_egg"></select></div>
          <div class="rem-field"><label>整皮蛋</label><select name="rem_whole_egg"></select></div>
          <div class="rem-field"><label>芹菜</label><select name="rem_celery"></select></div>
          <div class="rem-field"><label>菜脯</label><select name="rem_pickled_radish"></select></div>
        </div>
      </div>
    </div>

    <!-- 異常備註 -->
    <div class="stall-section" style="margin-bottom:0">
      <div class="stall-section__head"><i class="ti ti-message-dots"></i>異常備註（選填）</div>
      <div class="stall-section__body">
        <div class="fg" style="gap:12px">
          <div class="field field--stall">
            <label>異常類型</label>
            <select name="anomaly_type" id="s-anomaly">
              <option value="">無異常 ✓</option>
              <option value="提早賣完">⚡ 提早賣完</option>
              <option value="剩太多">📦 剩太多</option>
              <option value="太稠">🍲 底料太稠</option>
              <option value="太稀">💧 底料太稀</option>
              <option value="客訴">💬 客人反應異常</option>
              <option value="其他">📝 其他</option>
            </select>
          </div>
          <div class="field field--stall">
            <label>說明</label>
            <textarea name="note" id="s-note" rows="3" placeholder="例：今天下雨人少，湯頭客人說偏鹹…"></textarea>
          </div>
        </div>
      </div>
    </div>

  </form>

  <!-- 完成畫面 -->
  <div class="stall-done" id="stall-done">
    <i class="ti ti-circle-check stall-done__icon"></i>
    <div class="stall-done__title">回報完成！</div>
    <div class="stall-done__sub" id="stall-done-detail"></div>
    <button class="btn btn--stall btn--lg" onclick="resetStallForm()">
      <i class="ti ti-refresh"></i> 再填一份
    </button>
  </div>

</div><!-- /stall-page -->

<!-- 固定送出列 -->
<div class="stall-submit-bar" id="submit-bar"
     style="left:50%;transform:translateX(-50%);max-width:540px">
  <button type="button" class="btn btn--stall btn--full btn--xl" id="btn-stall-submit">
    <i class="ti ti-send"></i> 送出今日回報
  </button>
</div>

<div class="loading-overlay" id="ck-loading">
  <div class="loading-box">
    <div class="loading-spinner" style="border-top-color:var(--stall-accent)"></div>
    <p class="loading-msg">送出中…</p>
  </div>
</div>
<div class="toast" id="ck-toast"></div>

<script src="js/config.js"></script>
<script src="js/api.js"></script>
<script src="js/ui.js"></script>
<script src="js/stall.js"></script>
</body>
</html>
